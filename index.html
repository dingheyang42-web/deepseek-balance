<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DeepSeek 余额">
  <meta name="theme-color" content="#0D1117">
  <meta name="description" content="DeepSeek API 余额监控">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>DeepSeek 余额</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #0D1117;
      color: #FFFFFF;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* ===== Keyframes ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-40px) scaleY(0.8); }
      to   { opacity: 1; transform: translateY(0) scaleY(1); }
    }
    @keyframes numberRoll {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== App Container ===== */
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 30px;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 4px;
      animation: fadeInUp 0.6s ease-out;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #4FACFE, #00F2FE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    .header .status-dot.online { background: #00C853; box-shadow: 0 0 8px #00C85388; }
    .header .status-dot.offline { background: #FF6B35; box-shadow: 0 0 8px #FF6B3588; }
    .header .status-text {
      font-size: 13px;
      color: #8B949E;
      -webkit-text-fill-color: #8B949E;
    }

    /* ===== Settings Toggle ===== */
    .settings-trigger {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1A1D24;
      border: 1px solid #2D3139;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 18px;
    }
    .settings-trigger:active { transform: scale(0.92); background: #252931; }

    /* ===== Card ===== */
    .card {
      background: #1A1D24;
      border-radius: 16px;
      border: 1px solid #2D3139;
      padding: 20px;
      animation: fadeInUp 0.6s ease-out;
      transition: border-color 0.3s;
    }
    .card:active { border-color: #4FACFE44; }
    .card-label {
      font-size: 13px;
      color: #8B949E;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ===== Balance Card ===== */
    .balance-card { text-align: center; padding: 28px 20px 24px; }
    .balance-amount {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 4px;
      animation: numberRoll 0.5s ease-out;
      font-variant-numeric: tabular-nums;
    }
    .balance-amount .currency-sign {
      font-size: 24px;
      font-weight: 400;
      color: #8B949E;
    }
    .balance-sub {
      font-size: 14px;
      color: #8B949E;
      margin-bottom: 20px;
    }
    .balance-breakdown {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
    }
    .balance-breakdown .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .balance-breakdown .item .value {
      font-size: 16px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .balance-breakdown .item .label {
      font-size: 11px;
      color: #8B949E;
    }
    .balance-breakdown .item .value.granted { color: #4FACFE; }
    .balance-breakdown .item .value.topped  { color: #00C853; }
    .balance-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }
    .balance-status.available {
      background: #00C85318;
      color: #00C853;
      border: 1px solid #00C85344;
    }
    .balance-status.unavailable {
      background: #FF6B3518;
      color: #FF6B35;
      border: 1px solid #FF6B3544;
    }
    .balance-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .balance-status.available .dot { background: #00C853; }
    .balance-status.unavailable .dot { background: #FF6B35; }

    /* ===== Chart Card ===== */
    .chart-card { padding: 20px; }
    .chart-wrapper {
      width: 100%;
      height: 100px;
      position: relative;
    }
    .chart-wrapper canvas {
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }
    .chart-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #2D3139;
      font-size: 13px;
    }
    .chart-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      color: #8B949E;
    }
    .chart-stats .change {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .chart-stats .change.up { color: #00C853; }
    .chart-stats .change.down { color: #FF6B35; }

    /* ===== Quick Actions ===== */
    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #4FACFE, #00F2FE);
      color: #0D1117;
      box-shadow: 0 4px 20px #4FACFE33;
    }
    .btn-primary:active {
      box-shadow: 0 2px 10px #4FACFE22;
    }
    .btn-secondary {
      background: #1A1D24;
      color: #FFFFFF;
      border: 1px solid #2D3139;
    }
    .btn-secondary:active { background: #252931; }
    .btn .icon { font-size: 20px; }

    /* ===== Footer ===== */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 4px;
      margin-top: auto;
      animation: fadeInUp 0.8s ease-out;
    }
    .footer .update-info {
      font-size: 12px;
      color: #2D3139;
    }
    .footer .update-info .time { color: #8B949E; }
    .refresh-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1A1D24;
      border: 1px solid #2D3139;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      color: #8B949E;
      font-size: 18px;
    }
    .refresh-btn:active { transform: rotate(180deg); background: #252931; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear; }

    /* ===== Settings Modal ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      animation: fadeInUp 0.3s ease-out;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1A1D24;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 30px;
      width: 100%;
      max-width: 480px;
      animation: slideDown 0.35s ease-out;
      border-top: 1px solid #2D3139;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #2D3139;
      border: none;
      color: #FFFFFF;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:active { background: #3D4149; }
    .modal-label {
      font-size: 13px;
      color: #8B949E;
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: #0D1117;
      border: 1px solid #2D3139;
      color: #FFFFFF;
      font-size: 14px;
      font-family: 'SF Mono', 'Menlo', monospace;
      outline: none;
      transition: border-color 0.3s;
    }
    .modal-input:focus { border-color: #4FACFE; }
    .modal-input::placeholder { color: #3D4149; }
    .modal-hint {
      font-size: 12px;
      color: #8B949E;
      margin-top: 8px;
      line-height: 1.5;
    }
    .modal .btn { margin-top: 16px; width: 100%; }
    .modal-divider {
      height: 1px;
      background: #2D3139;
      margin: 20px 0;
    }
    .modal-danger-btn {
      background: transparent;
      color: #FF6B35;
      border: 1px solid #FF6B3544;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-danger-btn:active { background: #FF6B3518; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #1A1D24;
      border: 1px solid #2D3139;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      color: #FFFFFF;
      z-index: 200;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Loading Skeleton ===== */
    .skeleton {
      background: linear-gradient(90deg, #1A1D24 25%, #252931 50%, #1A1D24 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }
    .skeleton-text { height: 16px; width: 60%; margin: 8px auto; }
    .skeleton-number { height: 52px; width: 40%; margin: 4px auto; border-radius: 8px; }

    /* ===== Error State ===== */
    .error-state {
      text-align: center;
      padding: 16px;
      color: #FF6B35;
      font-size: 14px;
    }
    .error-state .icon { font-size: 32px; margin-bottom: 8px; }

    /* ===== Responsive ===== */
    @media (min-width: 480px) {
      .app { padding: 28px 24px 30px; gap: 18px; }
      .balance-amount { font-size: 58px; }
    }
    @media (max-width: 374px) {
      .balance-amount { font-size: 40px; }
      .card { padding: 16px; }
    }

    /* ===== Safe area ===== */
    .safe-bottom { height: env(safe-area-inset-bottom, 0px); }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <div>
        <span class="status-dot online" id="statusDot"></span>
        <span class="status-text" id="statusText">连接中...</span>
      </div>
      <h1>DeepSeek 余额</h1>
      <button class="settings-trigger" id="settingsBtn" aria-label="设置">⚙️</button>
    </header>

    <!-- Balance Card -->
    <section class="card balance-card" id="balanceCard">
      <div class="card-label">💰 账户总览</div>
      <div id="balanceContent">
        <div class="skeleton skeleton-number"></div>
        <div class="skeleton skeleton-text"></div>
      </div>
      <div id="balanceLoaded" style="display:none">
        <div class="balance-amount" id="balanceAmount">
          <span class="currency-sign" id="currencySign">¥</span>
          <span id="balanceValue">—</span>
        </div>
        <div class="balance-sub" id="balanceSub">总余额</div>
        <div class="balance-breakdown">
          <div class="item">
            <span class="value granted" id="grantedValue">0.00</span>
            <span class="label">赠送余额</span>
          </div>
          <div class="item">
            <span class="value topped" id="toppedValue">0.00</span>
            <span class="label">充值余额</span>
          </div>
        </div>
        <div class="balance-status available" id="balanceStatus">
          <span class="dot"></span>
          <span>账户可用</span>
        </div>
      </div>
    </section>

    <!-- Chart Card (Usage Trend) -->
    <section class="card chart-card">
      <div class="card-label">📊 余额走势</div>
      <div class="chart-wrapper" id="chartWrapper">
        <canvas id="sparkline"></canvas>
        <div class="chart-empty" id="chartEmpty">暂无数据，开始记录后将显示走势</div>
      </div>
      <div class="chart-stats" id="chartStats" style="display:none">
        <span>今日查询 <strong id="todayCount">0</strong> 次</span>
        <span class="change" id="balanceChange">±0.00</span>
      </div>
    </section>

    <!-- Quick Actions -->
    <section class="actions">
      <a class="btn btn-primary" href="https://platform.deepseek.com" target="_blank" rel="noopener noreferrer" id="rechargeBtn">
        <span class="icon">💳</span>
        立即充值
      </a>
      <a class="btn btn-secondary" href="https://platform.deepseek.com/usage" target="_blank" rel="noopener noreferrer" id="usageBtn">
        <span class="icon">📈</span>
        查看用量详情
      </a>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="update-info">
        上次更新 · <span class="time" id="updateTime">—</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" aria-label="刷新">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </footer>
    <div class="safe-bottom"></div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>⚙️ 设置</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <label class="modal-label">DeepSeek API Key</label>
      <input class="modal-input" id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off">
      <div class="modal-hint">
        API Key 仅保存在您的设备本地 (localStorage)，不会上传到任何第三方服务器。
        每次打开 App 时自动加载。
      </div>
      <button class="btn btn-primary" id="saveKeyBtn">💾 保存</button>
      <div class="modal-divider"></div>
      <button class="modal-danger-btn" id="clearHistoryBtn">🗑️ 清除历史记录</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ===== Configuration =====
    const CONFIG = {
      BALANCE_URL: 'https://api.deepseek.com/user/balance',
      RECHARGE_URL: 'https://platform.deepseek.com',
      USAGE_URL: 'https://platform.deepseek.com/usage',
      STORAGE_KEYS: {
        API_KEY: 'ds_monitor_api_key',
        HISTORY: 'ds_monitor_history',
        TODAY_COUNT: 'ds_monitor_today_count'
      },
      REFRESH_INTERVAL: 30000,   // 30s auto refresh
      MAX_HISTORY: 100           // max history records
    };

    // ===== DOM References =====
    const $ = id => document.getElementById(id);
    const balanceAmount     = $('balanceAmount');
    const balanceValue      = $('balanceValue');
    const currencySign      = $('currencySign');
    const balanceSub        = $('balanceSub');
    const grantedValue      = $('grantedValue');
    const toppedValue       = $('toppedValue');
    const balanceStatus     = $('balanceStatus');
    const balanceContent    = $('balanceContent');
    const balanceLoaded     = $('balanceLoaded');
    const statusDot         = $('statusDot');
    const statusText        = $('statusText');
    const updateTime        = $('updateTime');
    const refreshBtn        = $('refreshBtn');
    const settingsBtn       = $('settingsBtn');
    const settingsModal     = $('settingsModal');
    const modalClose        = $('modalClose');
    const apiKeyInput       = $('apiKeyInput');
    const saveKeyBtn        = $('saveKeyBtn');
    const clearHistoryBtn   = $('clearHistoryBtn');
    const chartEmpty        = $('chartEmpty');
    const sparklineCanvas   = $('sparkline');
    const todayCount        = $('todayCount');
    const balanceChange     = $('balanceChange');
    const chartStats        = $('chartStats');
    const toast             = $('toast');

    // ===== State =====
    let apiKey = '';
    let refreshTimer = null;
    let historyData = [];
    let todayQueryCount = 0;

    // ===== Toast =====
    let toastTimer = null;
    function showToast(msg, duration = 2500) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ===== Storage =====
    function loadSettings() {
      apiKey = localStorage.getItem(CONFIG.STORAGE_KEYS.API_KEY) || '';
      apiKeyInput.value = apiKey;
    }
    function saveKey(key) {
      localStorage.setItem(CONFIG.STORAGE_KEYS.API_KEY, key);
      apiKey = key;
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.HISTORY);
        historyData = raw ? JSON.parse(raw) : [];
      } catch { historyData = []; }
      try {
        const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.TODAY_COUNT);
        const parsed = raw ? JSON.parse(raw) : {};
        const today = new Date().toISOString().split('T')[0];
        todayQueryCount = parsed.date === today ? parsed.count : 0;
      } catch { todayQueryCount = 0; }
    }

    function saveHistoryRecord(balance) {
      const record = {
        t: Date.now(),
        b: parseFloat(balance) || 0,
        d: new Date().toISOString().split('T')[0]
      };
      historyData.push(record);
      if (historyData.length > CONFIG.MAX_HISTORY) {
        historyData = historyData.slice(-CONFIG.MAX_HISTORY);
      }
      localStorage.setItem(CONFIG.STORAGE_KEYS.HISTORY, JSON.stringify(historyData));

      // Update today count
      const today = new Date().toISOString().split('T')[0];
      todayQueryCount++;
      localStorage.setItem(CONFIG.STORAGE_KEYS.TODAY_COUNT, JSON.stringify({ date: today, count: todayQueryCount }));
      todayCount.textContent = todayQueryCount;
    }

    function clearAllHistory() {
      historyData = [];
      todayQueryCount = 0;
      localStorage.removeItem(CONFIG.STORAGE_KEYS.HISTORY);
      localStorage.removeItem(CONFIG.STORAGE_KEYS.TODAY_COUNT);
      drawChart();
      chartStats.style.display = 'none';
      chartEmpty.style.display = 'flex';
      todayCount.textContent = '0';
      showToast('历史记录已清除');
    }

    // ===== Chart (Sparkline) =====
    function drawChart() {
      const canvas = sparklineCanvas;
      const ctx = canvas.getContext('2d');
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = rect.width || 320;
      const h = rect.height || 100;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);

      ctx.clearRect(0, 0, w, h);

      // Show today's records only
      const today = new Date().toISOString().split('T')[0];
      const todayRecords = historyData.filter(r => r.d === today);
      const displayData = todayRecords.length >= 2 ? todayRecords : historyData.slice(-20);

      if (displayData.length < 2) {
        chartEmpty.style.display = 'flex';
        canvas.style.display = 'none';
        return;
      }

      chartEmpty.style.display = 'none';
      canvas.style.display = 'block';

      const values = displayData.map(r => r.b);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const padding = { top: 8, bottom: 8, left: 0, right: 0 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;

      const points = values.map((v, i) => ({
        x: padding.left + (i / (values.length - 1)) * chartW,
        y: padding.top + chartH - ((v - min) / range) * chartH
      }));

      // Gradient fill
      const grad = ctx.createLinearGradient(0, padding.top, 0, h - padding.bottom);
      grad.addColorStop(0, '#4FACFE66');
      grad.addColorStop(1, '#4FACFE06');

      // Draw fill
      ctx.beginPath();
      ctx.moveTo(points[0].x, h - padding.bottom);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, h - padding.bottom);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Draw line
      ctx.beginPath();
      points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.strokeStyle = '#4FACFE';
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();

      // Draw glow line overlay
      ctx.beginPath();
      points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.strokeStyle = '#4FACFE22';
      ctx.lineWidth = 6;
      ctx.stroke();

      // Draw last point dot
      const last = points[points.length - 1];
      ctx.beginPath();
      ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#4FACFE';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(last.x, last.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#4FACFE22';
      ctx.fill();

      // Stats
      const firstVal = values[0];
      const lastVal = values[values.length - 1];
      const diff = lastVal - firstVal;
      const diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(2);
      balanceChange.textContent = diffStr;
      balanceChange.className = 'change ' + (diff >= 0 ? 'up' : 'down');
      chartStats.style.display = 'flex';
    }

    // ===== API Call =====
    async function fetchBalance() {
      if (!apiKey) {
        setStatus('offline', '未设置 API Key');
        showBalanceError('请在设置中输入 API Key');
        stopLoading();
        return;
      }

      try {
        const res = await fetch(CONFIG.BALANCE_URL, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Accept': 'application/json'
          }
        });

        if (!res.ok) {
          const errText = await res.text().catch(() => '');
          if (res.status === 401) throw new Error('API Key 无效 (401)');
          if (res.status === 429) throw new Error('请求过于频繁 (429)');
          throw new Error(`请求失败 (${res.status})${errText ? ': ' + errText : ''}`);
        }

        const data = await res.json();
        return data;
      } catch (err) {
        throw err;
      }
    }

    // ===== UI Update =====
    function renderBalance(data) {
      const info = data.balance_infos && data.balance_infos[0];
      if (!info) throw new Error('未获取到余额信息');

      const total = parseFloat(info.total_balance) || 0;
      const granted = parseFloat(info.granted_balance) || 0;
      const topped = parseFloat(info.topped_balance) || 0;
      const currency = info.currency || 'CNY';
      const isAvailable = data.is_available;

      // Animate number
      animateNumber(balanceValue, total, 600);

      currencySign.textContent = currency === 'CNY' ? '¥' : '$';
      balanceSub.textContent = '总余额';

      grantedValue.textContent = granted.toFixed(2);
      toppedValue.textContent = topped.toFixed(2);

      // Status
      if (isAvailable) {
        balanceStatus.className = 'balance-status available';
        balanceStatus.innerHTML = '<span class="dot"></span> 账户可用';
        setStatus('online', '已连接');
      } else {
        balanceStatus.className = 'balance-status unavailable';
        balanceStatus.innerHTML = '<span class="dot"></span> 余额不足';
        setStatus('offline', '余额不足');
      }

      // Show loaded content
      balanceContent.style.display = 'none';
      balanceLoaded.style.display = 'block';

      // Save history & redraw chart
      saveHistoryRecord(total);
      drawChart();
    }

    function showBalanceError(msg) {
      balanceContent.style.display = 'none';
      balanceLoaded.style.display = 'block';
      balanceValue.textContent = '—';
      currencySign.textContent = '¥';
      balanceSub.textContent = msg;
      grantedValue.textContent = '—';
      toppedValue.textContent = '—';
      balanceStatus.className = 'balance-status unavailable';
      balanceStatus.innerHTML = '<span class="dot"></span> 出错了';
    }

    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function setUpdateTime(date) {
      const now = date || new Date();
      updateTime.textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function animateNumber(el, target, duration) {
      const start = parseFloat(el.textContent) || 0;
      const startTime = performance.now();

      function step(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Ease out cubic
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = start + (target - start) * eased;
        el.textContent = current.toFixed(2);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function stopLoading() {
      // No special loading state, just ensure UI is responsive
    }

    // ===== Main Refresh =====
    async function doRefresh(showToastMsg = false) {
      refreshBtn.classList.add('spinning');
      setTimeout(() => refreshBtn.classList.remove('spinning'), 800);

      try {
        const data = await fetchBalance();
        if (data) {
          renderBalance(data);
          setUpdateTime();
          if (showToastMsg) showToast('余额已更新');
        }
      } catch (err) {
        console.error('Refresh error:', err);
        let msg = err.message || '请求失败，请检查网络';
        if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
          msg = '网络连接失败，请检查网络';
        }
        showBalanceError(msg);
        setStatus('offline', '请求失败');
        setUpdateTime();
        if (showToastMsg) showToast(msg, 3000);
      }
    }

    // ===== Auto Refresh =====
    function startAutoRefresh() {
      stopAutoRefresh();
      refreshTimer = setInterval(() => doRefresh(false), CONFIG.REFRESH_INTERVAL);
    }
    function stopAutoRefresh() {
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    }

    // ===== Modal =====
    function openModal() { settingsModal.classList.add('open'); }
    function closeModal() { settingsModal.classList.remove('open'); }

    // ===== Init =====
    async function init() {
      loadSettings();
      loadHistory();

      // Hide loaded content initially, show skeleton
      balanceLoaded.style.display = 'none';
      balanceContent.style.display = 'block';

      // Draw chart with existing data
      drawChart();
      todayCount.textContent = todayQueryCount;

      // Initial fetch
      if (apiKey) {
        await doRefresh(false);
      } else {
        balanceContent.style.display = 'none';
        balanceLoaded.style.display = 'block';
        balanceValue.textContent = '—';
        currencySign.textContent = '¥';
        balanceSub.textContent = '请先设置 API Key';
        grantedValue.textContent = '—';
        toppedValue.textContent = '—';
        balanceStatus.className = 'balance-status unavailable';
        balanceStatus.innerHTML = '<span class="dot"></span> 未配置';
        setStatus('offline', '未配置 API Key');
        setUpdateTime();
      }

      startAutoRefresh();

      // Reset today count at midnight (simple check each refresh)
      setInterval(() => {
        const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.TODAY_COUNT);
        if (raw) {
          const parsed = JSON.parse(raw);
          const today = new Date().toISOString().split('T')[0];
          if (parsed.date !== today) {
            localStorage.setItem(CONFIG.STORAGE_KEYS.TODAY_COUNT, JSON.stringify({ date: today, count: 0 }));
            todayQueryCount = 0;
            todayCount.textContent = '0';
          }
        }
      }, 60000); // Check every minute
    }

    // ===== Event Listeners =====
    // Refresh
    refreshBtn.addEventListener('click', () => doRefresh(true));

    // Settings
    settingsBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) closeModal();
    });

    // Save API Key
    saveKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key) {
        showToast('请输入 API Key');
        return;
      }
      if (!key.startsWith('sk-')) {
        showToast('API Key 格式不正确 (应以 sk- 开头)');
        return;
      }
      saveKey(key);
      closeModal();
      showToast('API Key 已保存');
      // Re-fetch with new key
      doRefresh(false);
    });

    // Clear history
    clearHistoryBtn.addEventListener('click', () => {
      if (confirm('确定要清除所有历史记录吗？')) {
        clearAllHistory();
      }
    });

    // Enter key to save
    apiKeyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveKeyBtn.click();
    });

    // Resize handler for chart
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(drawChart, 200);
    });

    // Visibility API — refresh when coming back
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        doRefresh(false);
      }
    });

    // ===== Start =====
    document.addEventListener('DOMContentLoaded', init);

    // Chart on first paint
    window.addEventListener('load', () => {
      setTimeout(drawChart, 100);
    });

    console.log('🔮 DeepSeek 余额监控 v1.0');
    console.log('📱 PWA Ready — 使用 Safari "添加到主屏幕" 安装');
  </script>
</body>
</html>
